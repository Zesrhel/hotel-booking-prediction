name: Train Model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbconvert
    - name: Execute notebook
      run: |
        jupyter nbconvert --to notebook --execute notebook1.ipynb --output notebook1_executed.ipynb
    - name: Validate model
      run: |
        python validate_sample.py
    - name: Upload model artifact
      uses: actions/upload-artifact@v3
      with:
        name: hotel-cancellation-model
        path: artifacts/hotel_cancellation_model.joblib